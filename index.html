<!DOCTYPE html>
<html lang="es" data-theme="minimal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Carta Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400;1,600&display=swap" rel="stylesheet">
  <style>

    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ===== TOKENS ===== */
    :root {
      --t: 0.3s ease;
      --sans: 'Inter', system-ui, sans-serif;
      --serif: 'Playfair Display', Georgia, serif;
    }

    /* ── MINIMAL ── */
    [data-theme="minimal"] {
      --bg:           #f0ede8;
      --card:         #ffffff;
      --text:         #1a1a1a;
      --sub:          #6b6560;
      --muted:        #aaa49d;
      --accent:       #1a1a1a;
      --accent-inv:   #ffffff;
      --border:       #e2ddd8;
      --price:        #1a1a1a;
      --hero-bg:      #ffffff;
      --tab-on:       #1a1a1a;
      --tab-on-txt:   #ffffff;
      --nav-bg:       rgba(240,237,232,0.94);
      --shadow:       0 1px 4px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
      --hfont:        var(--sans);
    }

    /* ── DARK ELEGANTE ── */
    [data-theme="dark"] {
      --bg:           #0c0c0c;
      --card:         #191919;
      --text:         #e6d6bc;
      --sub:          #8a7a68;
      --muted:        #4e4438;
      --accent:       #c9a06a;
      --accent-inv:   #0c0c0c;
      --border:       #252015;
      --price:        #c9a06a;
      --hero-bg:      #0c0c0c;
      --tab-on:       #c9a06a;
      --tab-on-txt:   #0c0c0c;
      --nav-bg:       rgba(12,12,12,0.96);
      --shadow:       0 2px 10px rgba(0,0,0,0.5);
      --hfont:        var(--serif);
    }

    /* ===== BASE ===== */
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background var(--t), color var(--t);
      -webkit-font-smoothing: antialiased;
    }

    /* ===== HERO ===== */
    .hero {
      background: var(--hero-bg);
      padding: 16px 20px 28px;
      padding-top: calc(16px + env(safe-area-inset-top));
      border-bottom: 1px solid var(--border);
      transition: background var(--t), border-color var(--t);
    }

    .hero-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      margin-bottom: 22px;
    }

    /* Language switcher */
    .lang-switcher {
      display: flex;
      gap: 2px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px;
      transition: background var(--t), border-color var(--t);
    }

    .lang-btn {
      background: none;
      border: none;
      padding: 4px 10px;
      border-radius: 14px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      font-family: var(--sans);
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }

    .lang-btn.active {
      background: var(--accent);
      color: var(--accent-inv);
    }

    /* Theme toggle */
    .theme-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 34px;
      height: 34px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .theme-btn:active { transform: scale(0.9); }

    /* Restaurant identity */
    .hero-name {
      font-family: var(--hfont);
      font-size: 27px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.15;
      letter-spacing: -0.025em;
      transition: all var(--t);
    }

    [data-theme="dark"] .hero-name {
      font-size: 29px;
      font-weight: 600;
      font-style: italic;
      color: var(--accent);
      letter-spacing: 0.01em;
    }

    .hero-tagline {
      margin-top: 8px;
      font-size: 12.5px;
      color: var(--sub);
      font-weight: 300;
    }

    [data-theme="dark"] .hero-tagline {
      margin-top: 10px;
      font-size: 10.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .hero-divider {
      display: none;
    }

    [data-theme="dark"] .hero-divider {
      display: block;
      width: 36px;
      height: 1px;
      background: var(--accent);
      margin-top: 14px;
      opacity: 0.5;
    }

    /* ===== STICKY NAV ===== */
    .sticky-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--nav-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      transition: background var(--t), border-color var(--t);
    }

    .tabs-scroll {
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding: 10px 16px;
    }

    .tabs-scroll::-webkit-scrollbar { display: none; }

    .tabs {
      display: flex;
      gap: 6px;
      min-width: max-content;
    }

    .tab-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 13px;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      color: var(--sub);
      font-family: var(--sans);
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--tab-on);
      color: var(--tab-on-txt);
      border-color: var(--tab-on);
      font-weight: 600;
    }

    .tab-btn:not(.active):hover {
      color: var(--text);
      border-color: var(--sub);
    }

    /* ===== CONTENT ===== */
    .content {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px 14px calc(48px + env(safe-area-inset-bottom));
    }

    /* ===== CATEGORY ===== */
    .category {
      margin-bottom: 28px;
      scroll-margin-top: 56px;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding-left: 2px;
    }

    .category-icon { font-size: 16px; }

    .category-title {
      font-family: var(--hfont);
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
      transition: all var(--t);
    }

    [data-theme="dark"] .category-title {
      color: var(--accent);
      font-style: italic;
      font-size: 16px;
    }

    /* ===== ITEM CARDS ===== */
    .items-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item-card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px;
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: background var(--t), border-color var(--t);
    }

    .item-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    /* Name + price on same row */
    .item-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 4px;
    }

    .item-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
      flex: 1;
    }

    .item-price {
      font-size: 15px;
      font-weight: 700;
      color: var(--price);
      white-space: nowrap;
      flex-shrink: 0;
      transition: color var(--t);
    }

    [data-theme="dark"] .item-price {
      font-family: var(--serif);
      font-size: 16px;
    }

    .item-desc {
      font-size: 12.5px;
      color: var(--sub);
      line-height: 1.5;
      font-weight: 300;
      margin-bottom: 9px;
    }

    .item-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
      min-height: 0;
    }

    /* Badges */
    .badge {
      font-size: 9.5px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 8px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    [data-theme="minimal"] .badge-popular {
      background: #fff3cd;
      color: #92600a;
      border: 1px solid #f5d78e;
    }
    [data-theme="minimal"] .badge-new {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #6ee7b7;
    }
    [data-theme="dark"] .badge-popular {
      background: #2d1f07;
      color: #f5c842;
      border: 1px solid #4a3510;
    }
    [data-theme="dark"] .badge-new {
      background: #052e16;
      color: #4ade80;
      border: 1px solid #14532d;
    }

    /* Allergens */
    .allergen-tag {
      font-size: 9.5px;
      padding: 2px 7px;
      border-radius: 8px;
      background: var(--bg);
      color: var(--muted);
      border: 1px solid var(--border);
      letter-spacing: 0.02em;
    }

    /* Item image — fade in on load */
    .item-img {
      width: 84px;
      height: 84px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      align-self: center;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .item-img.loaded { opacity: 1; }

    [data-theme="dark"] .item-img {
      border-radius: 8px;
      border: 1px solid var(--border);
      filter: brightness(0.9) saturate(0.95);
    }

    /* ===== FOOTER ===== */
    .footer {
      text-align: center;
      padding: 18px 16px;
      padding-bottom: calc(18px + env(safe-area-inset-bottom));
      font-size: 10.5px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    [data-theme="dark"] .footer {
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

  </style>
</head>
<body>

<!-- ── HERO ── -->
<header class="hero">
  <div class="hero-actions">
    <div class="lang-switcher" id="lang-switcher"></div>
    <button class="theme-btn" id="theme-btn" aria-label="Cambiar tema">🌙</button>
  </div>
  <h1 class="hero-name" id="restaurant-name"></h1>
  <p class="hero-tagline" id="restaurant-tagline"></p>
  <div class="hero-divider"></div>
</header>

<!-- ── STICKY NAV ── -->
<nav class="sticky-nav">
  <div class="tabs-scroll">
    <div class="tabs" id="tabs"></div>
  </div>
</nav>

<!-- ── CONTENT ── -->
<main class="content" id="content"></main>

<!-- ── FOOTER ── -->
<footer class="footer">
  <span id="footer-text"></span>
</footer>

<script src="menu-data.js"></script>
<script>

  let lang  = 'es';
  let theme = 'minimal';
  const $   = id => document.getElementById(id);

  // ── Translate ──
  function t(obj) {
    if (!obj || typeof obj === 'string') return obj || '';
    return obj[lang] || obj['es'] || '';
  }

  // ── Theme ──
  $('theme-btn').addEventListener('click', () => {
    theme = theme === 'minimal' ? 'dark' : 'minimal';
    document.documentElement.setAttribute('data-theme', theme);
    $('theme-btn').textContent = theme === 'dark' ? '☀️' : '🌙';
  });

  // ── Language ──
  function setLang(l) {
    lang = l;
    document.documentElement.lang = l;
    renderAll();
  }

  // ── Allergen labels ──
  const ALLERGENS = {
    gluten:      { es:'Gluten',    en:'Gluten',    ca:'Gluten'      },
    lacteo:      { es:'Lácteo',    en:'Dairy',     ca:'Làctic'      },
    huevo:       { es:'Huevo',     en:'Egg',       ca:'Ou'          },
    pescado:     { es:'Pescado',   en:'Fish',      ca:'Peix'        },
    marisco:     { es:'Marisco',   en:'Shellfish', ca:'Marisc'      },
    cacahuete:   { es:'Cacahuete', en:'Peanut',    ca:'Cacauet'     },
    frutosSecos: { es:'F.Secos',   en:'Nuts',      ca:'Fruits Secs' },
    soja:        { es:'Soja',      en:'Soy',       ca:'Soia'        },
    mostaza:     { es:'Mostaza',   en:'Mustard',   ca:'Mostassa'    },
    apio:        { es:'Apio',      en:'Celery',    ca:'Api'         },
    sulfitos:    { es:'Sulfitos',  en:'Sulphites', ca:'Sulfits'     },
    sesamo:      { es:'Sésamo',    en:'Sesame',    ca:'Sèsam'       },
  };

  function aLabel(key) {
    return ALLERGENS[key] ? (ALLERGENS[key][lang] || ALLERGENS[key]['es']) : key;
  }

  // ── Badges ──
  const BADGES = {
    popular: { es:'Popular', en:'Popular', ca:'Popular' },
    new:     { es:'Nuevo',   en:'New',     ca:'Nou'     },
  };

  function badge(item) {
    if (!item.badge) return '';
    const label = BADGES[item.badge]?.[lang] || item.badge;
    return `<span class="badge badge-${item.badge}">${label}</span>`;
  }

  // ── Lang switcher ──
  function renderLangSwitcher() {
    const wrap = $('lang-switcher');
    wrap.innerHTML = menuData.config.languages.map(l =>
      `<button class="lang-btn${l === lang ? ' active' : ''}" data-l="${l}">${l.toUpperCase()}</button>`
    ).join('');
    wrap.querySelectorAll('.lang-btn').forEach(btn =>
      btn.addEventListener('click', () => setLang(btn.dataset.l))
    );
  }

  // ── Tabs ──
  function renderTabs() {
    $('tabs').innerHTML = menuData.categories.map(cat =>
      `<button class="tab-btn" data-target="${cat.id}">${cat.icon} ${t(cat.name)}</button>`
    ).join('');
    $('tabs').querySelectorAll('.tab-btn').forEach(btn =>
      btn.addEventListener('click', () =>
        document.getElementById(btn.dataset.target)
          ?.scrollIntoView({ behavior: 'smooth', block: 'start' })
      )
    );
  }

  // ── Scroll spy ──
  function setupScrollSpy() {
    const tabBtns = document.querySelectorAll('.tab-btn');

    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (!e.isIntersecting) return;
        const id = e.target.id;
        tabBtns.forEach(b => b.classList.toggle('active', b.dataset.target === id));
        $('tabs').querySelector('.tab-btn.active')
          ?.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      });
    }, { rootMargin: '-20% 0px -70% 0px' });

    document.querySelectorAll('.category').forEach(s => observer.observe(s));
  }

  // ── Content ──
  function renderContent() {
    $('content').innerHTML = menuData.categories.map(cat => `
      <section class="category" id="${cat.id}">
        <div class="category-header">
          <span class="category-icon">${cat.icon}</span>
          <span class="category-title">${t(cat.name)}</span>
        </div>
        <div class="items-list">
          ${cat.items.map(item => `
            <div class="item-card">
              ${item.image ? `<img class="item-img" src="${item.image}" alt="${t(item.name)}" loading="lazy" onload="this.classList.add('loaded')">` : ''}
              <div class="item-body">
                <div class="item-top">
                  <span class="item-name">${t(item.name)}</span>
                  ${item.price != null ? `<span class="item-price">${item.price.toFixed(2)} €</span>` : ''}
                </div>
                ${item.description ? `<p class="item-desc">${t(item.description)}</p>` : ''}
                <div class="item-meta">
                  ${badge(item)}
                  ${(item.allergens || []).map(a => `<span class="allergen-tag">${aLabel(a)}</span>`).join('')}
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </section>
    `).join('');

    setupScrollSpy();
  }

  // ── Render all ──
  function renderAll() {
    document.title                      = t(menuData.restaurant.name);
    $('restaurant-name').textContent    = t(menuData.restaurant.name);
    $('restaurant-tagline').textContent = t(menuData.restaurant.tagline);
    $('footer-text').textContent        = t(menuData.config.footerText);
    renderLangSwitcher();
    renderTabs();
    renderContent();
  }

  renderAll();

</script>
</body>
</html>
